<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ===== SEO META TAGS =====
  IMPORTANT: Replace "https://YOUR-USERNAME.github.io/YOUR-REPO/" everywhere
  below with your real GitHub Pages URL once the site is live.
-->
<title>UtilityBox — Free Online Calculator, Converter, Background Remover & PDF Tools</title>
<meta name="description" content="Free online utility tools: unit converter, calculator, EMI calculator, BMI calculator, age calculator, notes editor, image resizer, AI background remover, and PDF merge/split. No signup, no uploads — everything runs in your browser.">
<meta name="keywords" content="unit converter, online calculator, EMI calculator, BMI calculator, age calculator, background remover, image resizer, PDF merge, PDF split, free online tools">
<link rel="canonical" href="https://YOUR-USERNAME.github.io/YOUR-REPO/">

<!-- Open Graph (Facebook, WhatsApp, LinkedIn preview) -->
<meta property="og:type" content="website">
<meta property="og:title" content="UtilityBox — Free Online Calculator, Converter & Background Remover">
<meta property="og:description" content="Free unit converter, EMI/BMI/age calculator, notes editor, image tools, AI background remover, and PDF merge/split — all in one place, all in your browser.">
<meta property="og:url" content="https://YOUR-USERNAME.github.io/YOUR-REPO/">

<!-- Twitter Card -->
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="UtilityBox — Free Online Utility Tools">
<meta name="twitter:description" content="Unit converter, calculators, background remover, and PDF tools — free, no signup, runs in your browser.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">

<!--
  GOOGLE ADSENSE — verification + auto ads script.
  Step 1: Get your Publisher ID from adsense.google.com (looks like ca-pub-1234567890123456)
  Step 2: Replace BOTH occurrences of "ca-pub-XXXXXXXXXXXXXXXX" below with your real ID.
  Until then, this script does nothing harmful — it just won't load any ads.
-->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXXXXXXXXXXXXXX" crossorigin="anonymous"></script>
</head>
<body>

<div class="app-shell">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <span class="brand-mark">UB</span>
      <span class="brand-name">UtilityBox</span>
    </div>

    <nav class="tool-nav" id="toolNav">
      <div class="nav-group-label">Convert</div>
      <button class="nav-item active" data-tool="unit-converter">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M7 10l5-5 5 5M7 14l5 5 5-5"/></svg>
        Unit Converter
      </button>
      <button class="nav-item" data-tool="currency">
        <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9 9h3a2 2 0 010 4H9m0-4v8m0-4h3"/></svg>
        Currency Converter
      </button>

      <div class="nav-group-label">Calculate</div>
      <button class="nav-item" data-tool="calculator">
        <svg class="nav-icon" viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="12" x2="8" y2="12"/><line x1="12" y1="12" x2="12" y2="12"/><line x1="16" y1="12" x2="16" y2="12"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="12" y1="16" x2="12" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></svg>
        Calculator
      </button>
      <button class="nav-item" data-tool="emi">
        <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
        EMI / Loan
      </button>
      <button class="nav-item" data-tool="bmi">
        <svg class="nav-icon" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21v-2a8 8 0 0116 0v2"/></svg>
        BMI
      </button>
      <button class="nav-item" data-tool="age">
        <svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>
        Age Calculator
      </button>

      <div class="nav-group-label">Write</div>
      <button class="nav-item" data-tool="notes">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/><line x1="8" y1="9" x2="16" y2="9"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="12" y2="17"/></svg>
        Notes Editor
      </button>
      <button class="nav-item" data-tool="word-counter">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h10"/></svg>
        Word Counter
      </button>

      <div class="nav-group-label">Generate</div>
      <button class="nav-item" data-tool="qr-code">
        <svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><line x1="14" y1="14" x2="14" y2="21"/><line x1="21" y1="14" x2="21" y2="21"/><line x1="17" y1="14" x2="17" y2="17"/><line x1="17" y1="18" x2="21" y2="18"/></svg>
        QR Code
      </button>
      <button class="nav-item" data-tool="password">
        <svg class="nav-icon" viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 018 0v3"/></svg>
        Password Generator
      </button>

      <div class="nav-group-label">Image</div>
      <button class="nav-item" data-tool="image-tools">
        <svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
        Resize / Compress
      </button>
      <button class="nav-item" data-tool="bg-remove">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 3l18 18M3 21L21 3"/><circle cx="12" cy="12" r="9"/></svg>
        Background Remover
      </button>

      <div class="nav-group-label">PDF</div>
      <button class="nav-item" data-tool="pdf-tools">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M6 2h9l5 5v15H6z"/><path d="M15 2v5h5"/></svg>
        Merge / Split
      </button>
      <button class="nav-item" data-tool="pdf-to-text">
        <svg class="nav-icon" viewBox="0 0 24 24"><path d="M6 2h9l5 5v15H6z"/><path d="M15 2v5h5"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="16" x2="15" y2="16"/></svg>
        PDF to Word (text)
      </button>
    </nav>

    <div class="sidebar-foot">All tools run in your browser. No files leave your device.</div>

    <!--
      AD SLOT 1 (sidebar, below tool list).
      Step 1: Get an "ad unit" from your AdSense dashboard (Ads > By ad unit > Display ads).
      Step 2: Replace data-ad-client and data-ad-slot below with the values AdSense gives you.
    -->
    <div class="ad-slot ad-slot-sidebar">
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
           data-ad-slot="0000000000"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
    </div>
  </aside>

  <!-- Main panel -->
  <main class="panel" id="panel">
    <!--
      This intro is real, crawlable text (not injected by JS) so search engines
      have something to index even before app.js renders the active tool.
      It also gives first-time visitors a one-line explanation of the site.
    -->
    <noscript>
      <h1>UtilityBox — Free Online Tools</h1>
      <p>Unit converter, calculator, EMI calculator, BMI calculator, age calculator,
      notes editor, image resizer, background remover, and PDF merge/split tools.
      Please enable JavaScript to use these tools — everything runs in your browser
      and no files are uploaded to any server.</p>
    </noscript>
  </main>

  <!--
    AD SLOT 2 (below the panel, full width).
    Same steps as above — replace data-ad-client and data-ad-slot.
  -->
  <div class="ad-slot ad-slot-footer">
    <ins class="adsbygoogle"
         style="display:block"
         data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
         data-ad-slot="0000000000"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script type="module" src="app.js"></script>

<!--
  Initializes the two ad slots above. Wrapped in try/catch so the site
  works perfectly fine even before AdSense is approved / IDs are filled in.
-->
<script>
  try {
    (adsbygoogle = window.adsbygoogle || []).push({});
    (adsbygoogle = window.adsbygoogle || []).push({});
  } catch (e) {
    // AdSense not yet approved or IDs not filled in — safe to ignore.
  }
</script>
</body>
</html>
